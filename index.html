<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-табло ✈ Аэропорт Юрьевский (UVS) | Саратов</title>
    <style>
        :root {
            --bg-dark: #0a1628; --bg-panel: #111d33; --accent: #3b82f6;
            --accent-light: #60a5fa; --text-primary: #e2e8f0;
            --text-secondary: #94a3b8; --border: #1e3a5f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a1628; color: #e2e8f0; min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(96,165,250,0.08) 0%, transparent 50%);
        }
        .header {
            background: #111d33; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1e3a5f; flex-wrap: wrap; gap: 20px;
            box-shadow: 0 4px 20px rgba(59,130,246,0.1);
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .code {
            font-size: 2.5rem; font-weight: 800; color: #3b82f6;
            letter-spacing: 2px; text-shadow: 0 0 30px rgba(59,130,246,0.5);
        }
        .name { font-size: 1.4rem; font-weight: 600; }
        .city { font-size: 0.9rem; color: #94a3b8; }
        .clock {
            font-size: 1.8rem; font-weight: 700; color: #60a5fa;
            font-family: 'Courier New', monospace;
        }
        .date-text { font-size: 0.85rem; color: #94a3b8; text-align: right; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .title {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; color: #60a5fa;
        }
        .title::before {
            content: ''; display: inline-block; width: 4px; height: 28px;
            background: linear-gradient(to bottom, #3b82f6, #2563eb); border-radius: 2px;
        }
        table {
            width: 100%; background: #111d33; border-radius: 12px;
            border: 1px solid #1e3a5f; border-collapse: collapse; overflow: hidden;
        }
        th {
            background: rgba(30,58,95,0.6); padding: 16px; text-align: left;
            color: #94a3b8; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 1px; border-bottom: 2px solid #1e3a5f;
        }
        td { padding: 18px 16px; border-bottom: 1px solid #1e3a5f; }
        tr { transition: all 0.3s ease; }
        tr:hover { background: rgba(59,130,246,0.08); box-shadow: inset 4px 0 0 #3b82f6; }
        .airline { color: #60a5fa; font-weight: 600; }
        .flight-num { font-weight: 700; font-size: 1.1rem; }
        .iata-code { color: #60a5fa; font-weight: 700; font-size: 0.9rem; }
        .badge {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600; letter-spacing: 0.3px;
        }
        .status-scheduled { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .status-check-in { background: rgba(59,130,246,0.25); color: #93c5fd; animation: pulse 2s infinite; }
        .status-boarding { background: rgba(245,158,11,0.2); color: #fbbf24; animation: pulse 1s infinite; }
        .status-departed { background: rgba(16,185,129,0.15); color: #34d399; }
        .status-check-in-closed { background: rgba(59,130,246,0.1); color: #94a3b8; }
        .status-boarding-closed { background: rgba(239,68,68,0.15); color: #f87171; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(59,130,246,0.3); }
            50% { box-shadow: 0 0 20px rgba(59,130,246,0.6); }
        }
        .info-row { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
        .admin-link {
            position: fixed; bottom: 20px; right: 20px;
            background: #111d33; color: #60a5fa; padding: 10px 20px;
            border-radius: 20px; text-decoration: none; border: 1px solid #3b82f6;
            font-weight: 600; font-size: 0.85rem;
        }
        .admin-link:hover { background: rgba(59,130,246,0.15); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <div class="code">UVS</div>
            <div>
                <div class="name">Аэропорт Юрьевский</div>
                <div class="city">Саратов • Международный</div>
            </div>
        </div>
        <div>
            <div class="clock" id="clock">--:--</div>
            <div class="date-text" id="dateDisplay">--</div>
        </div>
    </header>

    <div class="container">
        <div class="title">Вылет • Departures</div>
        <table>
            <thead>
                <tr><th>Время</th><th>Рейс</th><th>Направление</th><th>Статус</th></tr>
            </thead>
            <tbody id="board">
                <tr><td colspan="4" style="text-align:center;padding:40px;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <a href="/admin.html" class="admin-link">🔧 Управление</a>

    <script>
        // Данные хранятся в localStorage
        const STORAGE_KEY = 'uvs_flights';

        function getFlights() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch(e) {
                return [];
            }
        }

        function getSaratovTime() {
            const now = new Date();
            let h = now.getUTCHours() + 4;
            let d = now.getUTCDate();
            let m = now.getUTCMonth();
            let y = now.getUTCFullYear();
            if (h >= 24) { h -= 24; d++; }
            return { hours: h, minutes: now.getUTCMinutes(), seconds: now.getUTCSeconds(), date: d, month: m, year: y };
        }

        function getDateString() {
            const t = getSaratovTime();
            return `${t.year}-${String(t.month+1).padStart(2,'0')}-${String(t.date).padStart(2,'0')}`;
        }

        function timeToMin(t) {
            if (!t) return 0;
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        function updateStatuses(flights) {
            const t = getSaratovTime();
            const now = t.hours * 60 + t.minutes;
            const today = getDateString();

            return flights.map(f => {
                if (!f.date || f.date !== today) {
                    f.status = f.date < today ? 'departed' : 'scheduled';
                    f.statusText = f.date < today ? 'Вылетел' : 'По расписанию';
                    return f;
                }
                const cis = timeToMin(f.checkInStart);
                const cie = timeToMin(f.checkInEnd);
                const bs = timeToMin(f.boardingStart);
                const be = timeToMin(f.boardingEnd);
                const dep = timeToMin(f.departureTime);
                
                if (now < cis) { f.status = 'scheduled'; f.statusText = 'По расписанию'; }
                else if (now < cie) { f.status = 'check-in'; f.statusText = 'Регистрация'; }
                else if (now < bs) { f.status = 'check-in-closed'; f.statusText = 'Регистрация закончена'; }
                else if (now < be) { f.status = 'boarding'; f.statusText = 'Посадка'; }
                else if (now < dep) { f.status = 'boarding-closed'; f.statusText = 'Посадка закончена'; }
                else { f.status = 'departed'; f.statusText = 'Вылетел'; }
                return f;
            });
        }

        function render() {
            let flights = getFlights();
            flights = updateStatuses(flights);
            const today = getDateString();
            const visible = flights
                .filter(f => f.date >= today)
                .sort((a, b) => (a.date + a.departureTime).localeCompare(b.date + b.departureTime));

            const tbody = document.getElementById('board');
            if (!visible.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:#94a3b8;">Нет рейсов</td></tr>';
                return;
            }
            tbody.innerHTML = visible.map(f => `
                <tr>
                    <td><strong>${f.departureTime || '—'}</strong></td>
                    <td><span class="airline">${esc(f.airline)}</span><br><span class="flight-num">${esc(f.flightNumber)}</span></td>
                    <td>${esc(f.destination)} <span class="iata-code">${esc(f.iata)}</span></td>
                    <td>
                        <span class="badge status-${f.status}">${f.statusText}</span>
                        ${f.checkInDesks && f.status==='check-in'?`<div class="info-row">Стойки: ${esc(f.checkInDesks)}</div>`:''}
                        ${f.gate && f.status==='boarding'?`<div class="info-row">Выход: ${esc(f.gate)}</div>`:''}
                    </td>
                </tr>
            `).join('');
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function updateClock() {
            const t = getSaratovTime();
            document.getElementById('clock').textContent = 
                `${String(t.hours).padStart(2,'0')}:${String(t.minutes).padStart(2,'0')}:${String(t.seconds).padStart(2,'0')} (UTC+4)`;
            const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
            const weekdays = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
            document.getElementById('dateDisplay').textContent = 
                `${weekdays[new Date(t.year, t.month, t.date).getDay()]}, ${t.date} ${months[t.month]} ${t.year} года`;
        }

        updateClock();
        setInterval(updateClock, 1000);
        render();
        setInterval(render, 10000);
    </script>
</body>
</html>
