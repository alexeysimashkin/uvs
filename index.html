<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-табло ✈ Аэропорт Юрьевский (UVS) | Саратов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a1628; color: #e2e8f0; min-height: 100vh;
        }
        .header {
            background: #111d33; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1e3a5f;
        }
        .code { font-size: 2.5rem; font-weight: 800; color: #3b82f6; letter-spacing: 2px; }
        .name { font-size: 1.4rem; font-weight: 600; }
        .city { font-size: 0.9rem; color: #94a3b8; }
        .clock { font-size: 1.8rem; font-weight: 700; color: #60a5fa; font-family: 'Courier New', monospace; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        table {
            width: 100%; background: #111d33; border-radius: 12px;
            border: 1px solid #1e3a5f; border-collapse: collapse;
        }
        th {
            background: rgba(30,58,95,0.6); padding: 16px; text-align: left;
            color: #94a3b8; font-size: 0.85rem; text-transform: uppercase;
        }
        td { padding: 18px 16px; border-bottom: 1px solid #1e3a5f; }
        tr:hover { background: rgba(59,130,246,0.08); }
        .badge {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
        }
        .status-scheduled { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .status-check-in { background: rgba(59,130,246,0.25); color: #93c5fd; animation: pulse 2s infinite; }
        .status-boarding { background: rgba(245,158,11,0.2); color: #fbbf24; animation: pulse 1s infinite; }
        .status-departed { background: rgba(16,185,129,0.15); color: #34d399; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(59,130,246,0.3); }
            50% { box-shadow: 0 0 20px rgba(59,130,246,0.6); }
        }
        .admin-link {
            position: fixed; bottom: 20px; right: 20px;
            background: #111d33; color: #60a5fa; padding: 10px 20px;
            border-radius: 20px; text-decoration: none; border: 1px solid #3b82f6;
        }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <span class="code">UVS</span>
            <div class="name">Аэропорт Юрьевский</div>
            <div class="city">Саратов • Международный</div>
        </div>
        <div class="clock" id="clock">--:--</div>
    </header>

    <div class="container">
        <h2 style="color:#60a5fa;margin-bottom:20px;">Вылет • Departures</h2>
        <table>
            <thead>
                <tr><th>Время</th><th>Рейс</th><th>Направление</th><th>Статус</th></tr>
            </thead>
            <tbody id="board"></tbody>
        </table>
    </div>

    <a href="/admin.html" class="admin-link">🔧 Управление</a>

    <script>
        // ⚠️ ЗАМЕНИ НА СВОЮ ССЫЛКУ
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/ТВОЙ_ID/export?format=csv';

        let flights = [];

        async function load() {
            try {
                const r = await fetch(SHEET_URL);
                const text = await r.text();
                const rows = text.trim().split('\n').slice(1);
                
                flights = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        id: cols[0],
                        airline: cols[1],
                        flightNumber: cols[2],
                        destination: cols[3],
                        iata: cols[4],
                        checkInStart: cols[5],
                        checkInEnd: cols[6],
                        boardingStart: cols[7],
                        boardingEnd: cols[8],
                        departureTime: cols[9],
                        date: cols[10],
                        checkInDesks: cols[11],
                        gate: cols[12]
                    };
                });

                updateStatuses();
                render();
            } catch(e) {
                document.getElementById('board').innerHTML = '<tr><td colspan="4" style="padding:40px;text-align:center;">Ошибка загрузки</td></tr>';
            }
        }

        function getTime() {
            const now = new Date();
            let h = now.getUTCHours() + 4;
            return { hours: h, minutes: now.getUTCMinutes(), total: h * 60 + now.getUTCMinutes() };
        }

        function getToday() {
            const now = new Date();
            let d = now.getUTCDate(), m = now.getUTCMonth(), y = now.getUTCFullYear();
            if (now.getUTCHours() + 4 >= 24) d++;
            return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }

        function updateStatuses() {
            const t = getTime();
            const today = getToday();

            flights.forEach(f => {
                if (f.date !== today) {
                    f.status = f.date < today ? 'departed' : 'scheduled';
                    f.text = f.date < today ? 'Вылетел' : 'По расписанию';
                    return;
                }
                const cis = toMin(f.checkInStart), cie = toMin(f.checkInEnd);
                const bs = toMin(f.boardingStart), be = toMin(f.boardingEnd);
                const dep = toMin(f.departureTime);
                
                if (t.total < cis) { f.status = 'scheduled'; f.text = 'По расписанию'; }
                else if (t.total < cie) { f.status = 'check-in'; f.text = 'Регистрация'; }
                else if (t.total < bs) { f.status = 'check-in-closed'; f.text = 'Рег. окончена'; }
                else if (t.total < be) { f.status = 'boarding'; f.text = 'Посадка'; }
                else if (t.total < dep) { f.status = 'boarding-closed'; f.text = 'Пос. окончена'; }
                else { f.status = 'departed'; f.text = 'Вылетел'; }
            });
        }

        function toMin(t) { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+m; }

        function render() {
            const today = getToday();
            const visible = flights.filter(f => f.date >= today).sort((a,b) => a.date.localeCompare(b.date) || a.departureTime.localeCompare(b.departureTime));
            
            if (!visible.length) {
                document.getElementById('board').innerHTML = '<tr><td colspan="4" style="padding:40px;text-align:center;">Нет рейсов</td></tr>';
                return;
            }

            document.getElementById('board').innerHTML = visible.map(f => `
                <tr>
                    <td><strong>${f.departureTime}</strong></td>
                    <td><span style="color:#60a5fa;">${f.airline}</span><br><strong>${f.flightNumber}</strong></td>
                    <td>${f.destination} <span style="color:#60a5fa;">${f.iata}</span></td>
                    <td><span class="badge status-${f.status}">${f.text}</span></td>
                </tr>
            `).join('');
        }

        setInterval(() => {
            const t = getTime();
            document.getElementById('clock').textContent = 
                `${String(t.hours).padStart(2,'0')}:${String(t.minutes).padStart(2,'0')} (UTC+4)`;
        }, 1000);

        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
