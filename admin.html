<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление ✈ Юрьевский (UVS) | Саратов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a1628; color: #e2e8f0; min-height: 100vh;
            padding: 40px;
        }
        h1 { color: #60a5fa; margin-bottom: 10px; }
        .nav { margin-bottom: 30px; }
        .nav a { color: #60a5fa; text-decoration: none; font-weight: 600; }
        .card {
            background: #111d33; border: 1px solid #1e3a5f;
            border-radius: 12px; padding: 30px; margin-bottom: 30px;
        }
        h2 { color: #60a5fa; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; }
        input {
            background: #0a1628; border: 1px solid #1e3a5f; color: #e2e8f0;
            padding: 10px; border-radius: 8px; font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-save { background: #3b82f6; color: white; font-size: 1rem; }
        .btn-save:hover { background: #2563eb; }
        .btn-cancel { background: transparent; border: 1px solid #1e3a5f; color: #94a3b8; margin-left: 10px; }
        .flight-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; background: #0a1628; border-radius: 8px;
            margin-bottom: 10px; flex-wrap: wrap; gap: 12px;
        }
        .flight-info { display: flex; gap: 20px; flex-wrap: wrap; }
        .btn-del {
            background: transparent; border: 1px solid #ef4444;
            color: #ef4444; padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
        .btn-edit {
            background: transparent; border: 1px solid #3b82f6;
            color: #3b82f6; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 6px;
        }
        .msg {
            position: fixed; bottom: 30px; right: 30px;
            padding: 14px 24px; border-radius: 10px; font-weight: 600;
            color: white; z-index: 9999; animation: fade 3s forwards;
        }
        .msg.success { background: #10b981; }
        .msg.error { background: #ef4444; }
        @keyframes fade {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        .copy-btn {
            background: #10b981; color: white; padding: 8px 16px;
            border-radius: 8px; border: none; cursor: pointer; font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🔧 Управление рейсами | Юрьевский (UVS)</h1>
    <div class="nav"><a href="/">← На табло</a></div>

    <div class="card">
        <h2 id="formTitle">➕ Добавить рейс</h2>
        <form onsubmit="saveFlight(event)">
            <input type="hidden" id="editId">
            <div class="grid">
                <div class="field"><label>Авиакомпания</label><input type="text" id="airline" required></div>
                <div class="field"><label>Номер рейса</label><input type="text" id="flightNumber" required></div>
                <div class="field"><label>Город</label><input type="text" id="destination" required></div>
                <div class="field"><label>IATA</label><input type="text" id="iata" maxlength="3" required></div>
            </div>
            <div class="grid">
                <div class="field"><label>Регистрация с</label><input type="time" id="checkInStart" required></div>
                <div class="field"><label>Регистрация до</label><input type="time" id="checkInEnd" required></div>
                <div class="field"><label>Посадка с</label><input type="time" id="boardingStart" required></div>
                <div class="field"><label>Посадка до</label><input type="time" id="boardingEnd" required></div>
                <div class="field"><label>Вылет ✈</label><input type="time" id="departureTime" required></div>
            </div>
            <div class="grid">
                <div class="field"><label>Стойки</label><input type="text" id="checkInDesks"></div>
                <div class="field"><label>Выход</label><input type="text" id="gate"></div>
                <div class="field"><label>Дата</label><input type="date" id="flightDate" required></div>
            </div>
            <button type="submit" class="btn btn-save" id="submitBtn">➕ Добавить рейс</button>
            <button type="button" class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none;">Отмена</button>
        </form>
    </div>

    <div class="card">
        <h2>📋 Все рейсы</h2>
        <button class="copy-btn" onclick="copyToTablo()">📋 Скопировать данные для табло</button>
        <div id="flightsList" style="margin-top:20px;">Загрузка...</div>
    </div>

    <script>
        const STORAGE_KEY = 'uvs_flights';

        function getFlights() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch(e) {
                return [];
            }
        }

        function saveFlights(flights) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(flights));
        }

        function getDateString() {
            const now = new Date();
            let h = now.getUTCHours() + 4, d = now.getUTCDate(), m = now.getUTCMonth(), y = now.getUTCFullYear();
            if (h >= 24) { d++; }
            return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }

        function saveFlight(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const flight = {
                id: editId || Date.now().toString(),
                airline: document.getElementById('airline').value.trim(),
                flightNumber: document.getElementById('flightNumber').value.trim(),
                destination: document.getElementById('destination').value.trim(),
                iata: document.getElementById('iata').value.toUpperCase(),
                checkInStart: document.getElementById('checkInStart').value,
                checkInEnd: document.getElementById('checkInEnd').value,
                boardingStart: document.getElementById('boardingStart').value,
                boardingEnd: document.getElementById('boardingEnd').value,
                departureTime: document.getElementById('departureTime').value,
                date: document.getElementById('flightDate').value,
                checkInDesks: document.getElementById('checkInDesks').value.trim(),
                gate: document.getElementById('gate').value.trim(),
            };

            let flights = getFlights();
            
            if (editId) {
                const idx = flights.findIndex(f => f.id === editId);
                if (idx !== -1) flights[idx] = flight;
            } else {
                flights.push(flight);
            }

            saveFlights(flights);
            showMsg('✅ Сохранено!');
            cancelEdit();
            render();
        }

        function editFlight(f) {
            document.getElementById('editId').value = f.id;
            document.getElementById('airline').value = f.airline || '';
            document.getElementById('flightNumber').value = f.flightNumber || '';
            document.getElementById('destination').value = f.destination || '';
            document.getElementById('iata').value = f.iata || '';
            document.getElementById('checkInStart').value = f.checkInStart || '';
            document.getElementById('checkInEnd').value = f.checkInEnd || '';
            document.getElementById('boardingStart').value = f.boardingStart || '';
            document.getElementById('boardingEnd').value = f.boardingEnd || '';
            document.getElementById('departureTime').value = f.departureTime || '';
            document.getElementById('flightDate').value = f.date || '';
            document.getElementById('checkInDesks').value = f.checkInDesks || '';
            document.getElementById('gate').value = f.gate || '';
            
            document.getElementById('formTitle').textContent = '✏️ Редактировать';
            document.getElementById('submitBtn').textContent = '💾 Сохранить';
            document.getElementById('cancelBtn').style.display = 'inline-block';
        }

        function cancelEdit() {
            document.querySelector('form').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = '➕ Добавить рейс';
            document.getElementById('submitBtn').textContent = '➕ Добавить рейс';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('flightDate').value = getDateString();
        }

        function del(id) {
            if (!confirm('Удалить рейс?')) return;
            let flights = getFlights();
            flights = flights.filter(f => f.id !== id);
            saveFlights(flights);
            showMsg('🗑 Удалено');
            render();
        }

        function render() {
            const flights = getFlights();
            if (!flights.length) {
                document.getElementById('flightsList').innerHTML = '<p style="color:#94a3b8;">Нет рейсов</p>';
                return;
            }
            document.getElementById('flightsList').innerHTML = flights
                .sort((a,b) => (a.date+a.departureTime).localeCompare(b.date+b.departureTime))
                .map(f => `
                    <div class="flight-item">
                        <div class="flight-info">
                            <span>📅 <strong>${f.date}</strong></span>
                            <span>🕐 <strong>${f.departureTime}</strong></span>
                            <span>✈ <strong>${f.airline} ${f.flightNumber}</strong></span>
                            <span>📍 ${f.destination} (${f.iata})</span>
                        </div>
                        <div>
                            <button class="btn-edit" onclick="editFlight(${JSON.stringify(f).replace(/"/g,'&quot;')})">✏️</button>
                            <button class="btn-del" onclick="del('${f.id}')">🗑</button>
                        </div>
                    </div>
                `).join('');
        }

        function copyToTablo() {
            const flights = getFlights();
            const json = JSON.stringify(flights);
            navigator.clipboard.writeText(json).then(() => {
                showMsg('📋 Данные скопированы! Вставь их в табло.');
            });
            
            // Показать инструкцию
            alert('Данные скопированы!\n\n1. Открой index.html (табло)\n2. Нажми F12 → Console\n3. Вставь данные и нажми Enter\n\nКоманда:\nlocalStorage.setItem("uvs_flights", \'' + json + '\');\nlocation.reload();');
        }

        function showMsg(msg) {
            const n = document.createElement('div');
            n.className = 'msg success';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        document.getElementById('flightDate').value = getDateString();
        render();
    </script>
</body>
</html>
